name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run lint:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  deploy:
    needs: [check]
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (smoke bundle for deploy)
        run: bun run build:smoke

      - name: Write .clasp.json
        env:
          CLASP_SCRIPT_ID: ${{ vars.CLASP_SCRIPT_ID }}
        run: |
          node -e "require('fs').writeFileSync('.clasp.json', JSON.stringify({ scriptId: process.env.CLASP_SCRIPT_ID, rootDir: 'dist' }));"

      - name: Restore clasp credentials
        run: echo "${{ secrets.CLASPRC_JSON_B64 }}" | base64 -d > "$HOME/.clasprc.json"

      - name: Push to Apps Script
        run: bunx clasp push

      - name: Run deploySmokeTest on Apps Script
        env:
          CLASP_SCRIPT_ID: ${{ vars.CLASP_SCRIPT_ID }}
        run: bun run run-deploy-smoke

      - name: Apply script properties (optional)
        env:
          CLASP_SCRIPT_ID: ${{ vars.CLASP_SCRIPT_ID }}
          GAS_SYNC_GUEST_EMAILS: ${{ secrets.GAS_SYNC_GUEST_EMAILS }}
          GAS_SYNC_LOOKAHEAD_DAYS: ${{ secrets.GAS_SYNC_LOOKAHEAD_DAYS }}
        run: bun run apply-script-properties
