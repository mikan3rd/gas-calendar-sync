name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run lint:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  deploy:
    needs: [check]
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (smoke bundle for deploy)
        run: bun run build:smoke

      - name: Setup clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          echo "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          echo "$CLASP_JSON" > .clasp.json

      - name: Push and deploy (clasp)
        run: |
          bunx clasp push --force
          bunx clasp deploy --description="$(git rev-parse --short HEAD)"

      - name: Run deploySmokeTest (clasp)
        run: |
          bunx clasp --json run deploySmokeTest | bun -e 'const j=JSON.parse(require("fs").readFileSync(0,"utf8"));if(j.error){console.error(j.error);process.exit(1)}if(j.response!=="deploy-smoke-ok"){console.error("expected deploy-smoke-ok, got",j.response);process.exit(1)}console.log("deploySmokeTest OK");'

      - name: Apply script properties (optional)
        env:
          GAS_SYNC_GUEST_EMAILS: ${{ secrets.GAS_SYNC_GUEST_EMAILS }}
          GAS_SYNC_LOOKAHEAD_DAYS: ${{ secrets.GAS_SYNC_LOOKAHEAD_DAYS }}
        run: bun run apply-script-properties
